<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream · Anmol.dev</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scrollbar-width:none}html::-webkit-scrollbar{display:none}
body{font-family:"DM Sans",sans-serif;background:#07070f;color:#f0f0ff;min-height:100vh;overflow-x:hidden}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
nav{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200;display:flex;align-items:center;padding:6px 8px 6px 20px;background:rgba(12,12,24,0.5);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border:1px solid rgba(255,255,255,0.12);border-radius:999px;box-shadow:0 8px 40px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.12);width:max-content;max-width:92vw}
.nav-logo{font-family:"Syne",sans-serif;font-weight:800;font-size:1.05rem;background:linear-gradient(135deg,#7c6eff,#ff6bb3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;margin-right:12px}
.nav-links{display:flex;gap:0;list-style:none;align-items:center}
.nav-links a{color:#9090b0;text-decoration:none;font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;font-weight:500;transition:color 0.18s,background 0.18s;padding:7px 13px;border-radius:999px}
.nav-links a:hover{color:#fff;background:rgba(255,255,255,0.08)}
.nav-links a.active{color:#7c6eff}
.nav-back{height:34px;padding:0 14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:999px;color:#d0d0f0;font-size:0.72rem;letter-spacing:0.06em;text-transform:uppercase;font-weight:500;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:background 0.2s;margin-left:6px}
.nav-back:hover{background:rgba(124,110,255,0.25);color:#fff}
/* User info in nav */
.nav-user{display:flex;align-items:center;gap:0.5rem;margin-left:8px}
.nav-user img{width:26px;height:26px;border-radius:50%;border:1px solid rgba(255,255,255,0.2)}
.nav-user-name{font-size:0.75rem;color:#d0d0f0;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-signout{background:none;border:none;color:#6a6a8a;font-size:0.7rem;cursor:pointer;padding:4px 8px;border-radius:6px;transition:color 0.2s;font-family:"JetBrains Mono",monospace}
.nav-signout:hover{color:#ff6bb3}

main{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 2rem 6rem}
.hero{padding:120px 0 3rem}
.hero-title{font-family:"Syne",sans-serif;font-size:clamp(3rem,7vw,5rem);font-weight:800;line-height:1.05;margin-bottom:1.1rem}
.hero-title em{font-style:italic;background:linear-gradient(135deg,#7c6eff,#ff6bb3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{color:#6a6a8a;font-size:0.95rem;max-width:480px;line-height:1.7;margin-bottom:2rem}

/* Auth buttons */
.entry-btns{display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:0}
.entry-btn{display:inline-flex;align-items:center;gap:0.65rem;padding:0.75rem 1.6rem;border-radius:999px;font-size:0.88rem;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:"DM Sans",sans-serif;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#f0f0ff}
.entry-btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.25)}
.entry-btn:disabled{opacity:0.5;cursor:not-allowed}
.manual-form{display:none;margin-top:1rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:1.25rem;display:none;flex-direction:column;gap:0.75rem;animation:fadeUp 0.3s ease;width:100%;max-width:380px}
.manual-form.show{display:flex}
.manual-input{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:0.65rem 1rem;color:#f0f0ff;font-family:"DM Sans",sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s}
.manual-input::placeholder{color:#4a4a6a}
.manual-input:focus{border-color:rgba(124,110,255,0.5)}

/* Write form */
.write-form{display:none;margin:1.5rem 0 2rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:16px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:1.5rem;box-shadow:inset 0 1px 0 rgba(255,255,255,0.08)}
.write-form.show{display:block;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.wf-top{display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem}
.wf-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,255,255,0.15)}
.wf-avatar-fallback{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#7c6eff,#ff6bb3);display:flex;align-items:center;justify-content:center;font-family:"Syne",sans-serif;font-weight:800;font-size:0.95rem;color:#fff;flex-shrink:0}
.wf-user-name{font-family:"Syne",sans-serif;font-size:0.95rem;font-weight:700;color:#f0f0ff}
.wf-divider{height:1px;background:rgba(255,255,255,0.07);margin-bottom:0.9rem}
.wf-textarea{width:100%;background:transparent;border:none;outline:none;color:#d0d0f0;font-family:"DM Sans",sans-serif;font-size:0.92rem;line-height:1.7;resize:none;min-height:80px;margin-bottom:0.85rem}
.wf-textarea::placeholder{color:#3a3a5a}
.wf-bottom{display:flex;align-items:center;justify-content:space-between}
.wf-mood-row{display:flex;gap:0.35rem}
.wf-mood{background:none;border:none;font-size:1.1rem;cursor:pointer;padding:4px;border-radius:8px;transition:all 0.15s;opacity:0.35;filter:grayscale(1)}
.wf-mood.active{opacity:1;filter:none;background:rgba(255,255,255,0.07)}
.wf-mood:hover{opacity:0.75;filter:grayscale(0)}
.wf-submit{padding:0.5rem 1.4rem;background:linear-gradient(135deg,#7c6eff,#ff6bb3);border:none;border-radius:999px;color:#fff;font-family:"DM Sans",sans-serif;font-size:0.82rem;font-weight:500;cursor:pointer;transition:opacity 0.2s,transform 0.2s}
.wf-submit:hover{opacity:0.85;transform:translateY(-1px)}
.wf-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none}

/* Feed */
.feed{margin-top:1rem}
.feed-loading{text-align:center;padding:3rem;font-family:"JetBrains Mono",monospace;font-size:0.75rem;color:#3a3a5a}
.th-card{display:flex;gap:1.1rem;align-items:flex-start;padding:1.5rem 0;border-bottom:1px solid rgba(255,255,255,0.06);animation:si 0.35s ease}
@keyframes si{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.th-avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,255,255,0.1);flex-shrink:0}
.th-avatar-fallback{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--c1,#7c6eff),var(--c2,#ff6bb3));display:flex;align-items:center;justify-content:center;font-family:"Syne",sans-serif;font-weight:800;font-size:1.1rem;color:#fff;flex-shrink:0}
.th-body{flex:1;min-width:0}
.th-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:0.35rem;gap:1rem}
.th-name{font-family:"Syne",sans-serif;font-size:1rem;font-weight:700;color:#f0f0ff}
.th-date{font-family:"JetBrains Mono",monospace;font-size:0.65rem;color:#3a3a5a;white-space:nowrap}
.th-msg{font-size:0.92rem;color:#c0c0d8;line-height:1.7;margin-bottom:0.9rem;word-break:break-word}
.th-mood{font-size:0.85rem;margin-left:0.4rem}
.th-reply{display:flex;align-items:flex-start;gap:0.6rem;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:0.7rem 0.9rem}
.th-reply-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#7c6eff,#43e8d8);display:flex;align-items:center;justify-content:center;font-family:"Syne",sans-serif;font-weight:800;font-size:0.55rem;color:#fff;flex-shrink:0}
.th-reply-text{font-size:0.82rem;color:#8080a0;line-height:1.6;font-style:italic}
.th-empty{text-align:center;padding:5rem 1rem;font-family:"JetBrains Mono",monospace;font-size:0.78rem;color:#3a3a5a}

/* Toast */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:rgba(20,20,36,0.95);border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:0.6rem 1.4rem;font-family:"JetBrains Mono",monospace;font-size:0.75rem;color:#f0f0ff;z-index:999;display:none;backdrop-filter:blur(20px)}
.toast.show{display:block;animation:fadeUp 0.3s ease}

footer{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:center;max-width:900px;margin:0 auto;padding:1.5rem 2rem;border-top:1px solid rgba(255,255,255,0.05);font-family:"JetBrains Mono",monospace;font-size:0.68rem;color:#3a3a5a}
footer a{color:#6a6a8a;text-decoration:none}footer a:hover{color:#f0f0ff}
.footer-links{display:flex;gap:1.5rem}
@media(max-width:600px){
  .hero{padding:100px 0 2rem}
  .hero-title{font-size:clamp(2.2rem,10vw,3.2rem)}
  nav{padding:5px 5px 5px 14px;max-width:94vw}
  .nav-links{display:none}
  main{padding:0 1.25rem 4rem}
  footer{flex-direction:column;gap:0.75rem;text-align:center}
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<nav>
  <a href="portfolio.html" class="nav-logo">Anmol.dev</a>
  <ul class="nav-links">
    <li><a href="portfolio.html#about">About</a></li>
    <li><a href="portfolio.html#projects">Projects</a></li>
    <li><a href="portfolio.html#services">Services</a></li>
    <li><a href="portfolio.html#contact">Contact</a></li>
    <li><a href="thoughts.html" class="active">Stream</a></li>
  </ul>
  <div class="nav-user" id="nav-user" style="display:none">
    <img id="nav-avatar" src="" alt="">
    <span class="nav-user-name" id="nav-name"></span>
    <button class="nav-signout" onclick="signOut()">sign out</button>
  </div>
  <a href="portfolio.html" class="nav-back">← Portfolio</a>
</nav>

<main>
  <div class="hero">
    <h1 class="hero-title">Drop Your <em>Thoughts!</em></h1>
    <p class="hero-sub">Leave a trace of your journey. Thoughts, feedback, or a simple hello.</p>

    <!-- Auth buttons (shown when logged out) -->
    <div class="entry-btns" id="auth-btns">
      <button class="entry-btn" id="github-btn" onclick="signInGitHub()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.49.5.09.68-.22.68-.48v-1.7C6.73 19.91 6.14 18 6.14 18c-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.08.63-1.33-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.56 9.56 0 0112 6.8c.85.004 1.71.115 2.51.337 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.69-4.57 4.93.36.31.68.92.68 1.85v2.74c0 .27.18.58.69.48A10.01 10.01 0 0022 12c0-5.52-4.48-10-10-10z"/></svg>
        Continue with GitHub
      </button>
      <button class="entry-btn" id="manual-btn" onclick="toggleManualForm()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Enter Manually
      </button>
    </div>

    <!-- Manual entry form -->
    <div class="manual-form" id="manual-form">
      <input class="manual-input" id="manual-name" type="text" placeholder="Your name" maxlength="50" />
      <input class="manual-input" id="manual-email" type="email" placeholder="Your email (optional)" maxlength="100" />
      <button class="wf-submit" id="manual-submit" onclick="signInManual()">Continue →</button>
    </div>

    <!-- Write form (shown when logged in) -->
    <div class="write-form" id="write-form">
      <div class="wf-top" id="wf-top"></div>
      <div class="wf-divider"></div>
      <textarea class="wf-textarea" id="wf-msg" placeholder="What's on your mind?" maxlength="300"></textarea>
      <div class="wf-bottom">
        <div class="wf-mood-row">
          <button class="wf-mood active" data-mood="🔥">🔥</button>
          <button class="wf-mood" data-mood="💡">💡</button>
          <button class="wf-mood" data-mood="👏">👏</button>
          <button class="wf-mood" data-mood="❤️">❤️</button>
          <button class="wf-mood" data-mood="🤔">🤔</button>
          <button class="wf-mood" data-mood="😂">😂</button>
        </div>
        <button class="wf-submit" id="wf-submit">Post →</button>
      </div>
    </div>
  </div>

  <div class="feed" id="feed">
    <div class="feed-loading">Loading thoughts...</div>
  </div>
</main>

<footer>
  <span>© 2026 <a href="portfolio.html">Anmol.dev</a></span>
  <span>Enjoyed your stay? Drop your thoughts above ↑</span>
  <div class="footer-links">
    <a href="https://linkedin.com/in/anmol" target="_blank">LinkedIn</a>
    <a href="https://github.com/anmol" target="_blank">GitHub</a>
  </div>
</footer>

<div class="toast" id="toast"></div>

<script>

/* ════════════════════════════════
   SUPABASE CONFIGURATION
   Replace URL and ANON key if you
   create a new Supabase project
   ════════════════════════════════ */
// ── Supabase init ──
const SUPABASE_URL = 'https://zhkcjyiguxlpvkyxkgfs.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpoa2NqeWlndXhscHZreXhrZ2ZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDkyMDcsImV4cCI6MjA4OTIyNTIwN30.wygFuoBbTf5gmxcOCy4qaG8ZEqNmK-LfNskzyLoBqUg';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: {
    flowType: 'implicit',
    detectSessionInUrl: true,
    persistSession: true
  }
});


/* ════════════════════════════════
   APP STATE
   ════════════════════════════════ */
let currentUser = null;
let selectedMood = '🔥';


/* ════════════════════════════════
   AUTO-REPLY MESSAGES
   These appear as replies below each thought
   ════════════════════════════════ */
const REPLIES = [
  "Thanks for the kind words!",
  "Appreciate you stopping by!",
  "That means a lot, thank you!",
  "Thanks for the feedback!",
  "Glad you enjoyed it!",
  "Your thoughts are always welcome here!",
  "Thanks for leaving a trace ✌️"
];
const COLORS = [['#7c6eff','#ff6bb3'],['#43e8d8','#7c6eff'],['#ff6bb3','#ffb84d'],['#a78bfa','#43e8d8'],['#ffb84d','#ff6bb3'],['#43e8d8','#ff6bb3']];

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function initial(n){return(n||'A').trim()[0].toUpperCase();}
function colors(n){return COLORS[(n||'A').charCodeAt(0)%COLORS.length];}
function autoReply(msg){return REPLIES[Math.abs([...msg].reduce((a,c)=>a+c.charCodeAt(0),0))%REPLIES.length];}
function formatDate(ts){return new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short'}).toUpperCase();}

function toast(msg, dur=3000){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}


/* ════════════════════════════════
   AUTHENTICATION FUNCTIONS
   GitHub OAuth via Supabase
   ════════════════════════════════ */
// ── Auth ──
async function signInGitHub(){
  document.getElementById('github-btn').disabled=true;
  document.getElementById('github-btn').textContent='Redirecting...';
  const redirectTo = window.location.origin + '/thoughts.html';
  const {error}=await sb.auth.signInWithOAuth({
    provider:'github',
    options:{redirectTo}
  });
  if(error){toast('Error: '+error.message);document.getElementById('github-btn').disabled=false;}
}



function toggleManualForm(){
  const form = document.getElementById('manual-form');
  form.classList.toggle('show');
  if(form.classList.contains('show')) document.getElementById('manual-name').focus();
}

function signInManual(){
  const name = document.getElementById('manual-name').value.trim();
  const email = document.getElementById('manual-email').value.trim();
  if(!name){document.getElementById('manual-name').focus();toast('Please enter your name');return;}
  // Store as a pseudo-user (no Supabase auth needed)
  currentUser = {
    id: 'manual_' + Date.now(),
    user_metadata: { full_name: name, email: email || null, avatar_url: null },
    isManual: true
  };
  document.getElementById('manual-form').classList.remove('show');
  updateUI(currentUser);
  toast('Welcome, ' + name + '!');
}

async function signOut(){
  if(!currentUser?.isManual) await sb.auth.signOut();
  currentUser=null;
  updateUI(null);
  toast('Signed out');
}


/* ════════════════════════════════
   UI UPDATE
   Shows/hides elements based on
   whether user is logged in
   ════════════════════════════════ */
function updateUI(user){
  const authBtns=document.getElementById('auth-btns');
  const writeForm=document.getElementById('write-form');
  const navUser=document.getElementById('nav-user');

  if(user){
    currentUser=user;
    authBtns.style.display='none';
    writeForm.classList.add('show');

    // Nav user
    navUser.style.display='flex';
    document.getElementById('nav-name').textContent=user.user_metadata?.user_name||user.email||'User';
    const navAvatar=document.getElementById('nav-avatar');
    if(user.user_metadata?.avatar_url) navAvatar.src=user.user_metadata.avatar_url;
    else navAvatar.style.display='none';

    // Write form top
    const avatarUrl=user.user_metadata?.avatar_url;
    const name=user.user_metadata?.full_name||user.user_metadata?.user_name||'User';
    document.getElementById('wf-top').innerHTML=avatarUrl
      ?`<img class="wf-avatar" src="${esc(avatarUrl)}" alt=""><span class="wf-user-name">${esc(name)}</span>`
      :`<div class="wf-avatar-fallback">${esc(initial(name))}</div><span class="wf-user-name">${esc(name)}</span>`;
  } else {
    authBtns.style.display='flex';
    writeForm.classList.remove('show');
    navUser.style.display='none';
  }
}


/* ════════════════════════════════
   LOAD THOUGHTS FROM DATABASE
   Fetches all thoughts from Supabase
   ════════════════════════════════ */
// ── Load thoughts ──
async function loadThoughts(){
  const {data,error}=await sb.from('thoughts').select('*').order('created_at',{ascending:false}).limit(100);
  const feed=document.getElementById('feed');
  if(error||!data||!data.length){
    feed.innerHTML='<div class="th-empty">No thoughts yet. Be the first to leave a trace!</div>';
    return;
  }
  feed.innerHTML=data.map(t=>{
    const[c1,c2]=colors(t.name);
    const reply=autoReply(t.message);
    const avatarHtml=t.avatar_url
      ?`<img class="th-avatar" src="${esc(t.avatar_url)}" alt="" onerror="this.style.display='none'">`
      :`<div class="th-avatar-fallback" style="--c1:${c1};--c2:${c2}">${esc(initial(t.name))}</div>`;
    return`<div class="th-card">
      ${avatarHtml}
      <div class="th-body">
        <div class="th-top">
          <span class="th-name">${esc(t.name)}<span class="th-mood">${t.mood||'🔥'}</span></span>
          <span class="th-date">${formatDate(t.created_at)}</span>
        </div>
        <div class="th-msg">${esc(t.message)}</div>
        <div class="th-reply">
          <div class="th-reply-avatar">A</div>
          <span class="th-reply-text">${reply}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}


/* ════════════════════════════════
   POST NEW THOUGHT
   Saves thought to Supabase database
   ════════════════════════════════ */
// ── Post thought ──
document.querySelectorAll('.wf-mood').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.wf-mood').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');selectedMood=b.dataset.mood;
}));

document.getElementById('wf-submit').addEventListener('click',async()=>{
  if(!currentUser){toast('Please sign in or enter your name first');return;}
  const msg=document.getElementById('wf-msg').value.trim();
  if(!msg){document.getElementById('wf-msg').focus();return;}
  const btn=document.getElementById('wf-submit');
  btn.disabled=true;btn.textContent='Posting...';
  const name=currentUser.user_metadata?.full_name||currentUser.user_metadata?.user_name||'User';
  const avatar_url=currentUser.isManual ? null : (currentUser.user_metadata?.avatar_url||null);
  const {error}=await sb.from('thoughts').insert({name,message:msg.slice(0,300),mood:selectedMood,avatar_url});
  btn.disabled=false;btn.textContent='Post →';
  if(error){toast('Error: '+error.message);return;}
  document.getElementById('wf-msg').value='';
  toast('Posted! ✓');
  loadThoughts();
});


/* ════════════════════════════════
   AUTH STATE LISTENER
   Detects login/logout events
   ════════════════════════════════ */
// ── Auth state ──
// Handle OAuth callback from URL hash/params
async function handleAuthCallback(){
  // Check for OAuth tokens in URL
  if(window.location.hash || window.location.search.includes('code=') || window.location.search.includes('access_token=')){
    const {data,error} = await sb.auth.exchangeCodeForSession(window.location.search).catch(()=>({data:null,error:true}));
    if(data?.session){
      updateUI(data.session.user);
      loadThoughts();
      // Clean URL
      window.history.replaceState({},document.title,window.location.pathname);
      return;
    }
    // Try getting session directly (for implicit flow)
    const {data:{session}} = await sb.auth.getSession();
    if(session){
      updateUI(session.user);
      loadThoughts();
      window.history.replaceState({},document.title,window.location.pathname);
      return;
    }
  }
  // Normal session check
  const {data:{session}} = await sb.auth.getSession();
  updateUI(session?.user||null);
  loadThoughts();
}

sb.auth.onAuthStateChange((event,session)=>{
  if(event==='SIGNED_IN'||event==='TOKEN_REFRESHED'){
    updateUI(session?.user||null);
    loadThoughts();
  } else if(event==='SIGNED_OUT'){
    updateUI(null);
  }
});

handleAuthCallback();

// ── Particles ──
(function(){
  const c=document.getElementById('bg-canvas'),ctx=c.getContext('2d');
  let W,H,nodes=[],mouse={x:-9999,y:-9999,vx:0,vy:0};
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  resize();window.addEventListener('resize',()=>{resize();init();});
  window.addEventListener('mousemove',e=>{mouse.vx=e.clientX-mouse.x;mouse.vy=e.clientY-mouse.y;mouse.x=e.clientX;mouse.y=e.clientY;});
  function init(){nodes=[];const n=Math.max(100,Math.floor(W*H/9000)),cols=["#7c6eff","#ff6bb3","#43e8d8","#a78bfa"];for(let i=0;i<n;i++)nodes.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.8+.5,color:cols[Math.floor(Math.random()*cols.length)],ph:Math.random()*Math.PI*2});}
  init();
  function hexRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<140){ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.strokeStyle=`rgba(124,110,255,${.1*(1-d/140)})`;ctx.lineWidth=.5;ctx.stroke();}}
    const spd=Math.sqrt(mouse.vx*mouse.vx+mouse.vy*mouse.vy);
    for(const n of nodes){
      n.ph+=.018;const dx=n.x-mouse.x,dy=n.y-mouse.y,md=Math.sqrt(dx*dx+dy*dy),prox=Math.max(0,1-md/180);
      if(prox>.05){const[r,g,b]=hexRgb(n.color);ctx.beginPath();ctx.arc(n.x,n.y,n.r*6,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},${prox*.18})`;ctx.fill();}
      ctx.beginPath();ctx.arc(n.x,n.y,n.r+prox*2,0,Math.PI*2);ctx.fillStyle=n.color;ctx.globalAlpha=.5+Math.sin(n.ph)*.1+prox*.3;ctx.fill();ctx.globalAlpha=1;
      if(spd>.3&&md<220){ctx.beginPath();ctx.moveTo(mouse.x,mouse.y);ctx.lineTo(n.x,n.y);ctx.strokeStyle=`rgba(124,110,255,${.28*(1-md/220)*(Math.min(spd,20)/20)})`;ctx.lineWidth=.6;ctx.stroke();}
      if(md<150&&md>0&&spd>.5){const f=(150-md)/150;n.vx+=(dx/md)*f*.8;n.vy+=(dy/md)*f*.8;}
      n.vx*=.985;n.vy*=.985;n.vx+=(Math.random()-.5)*.025;n.vy+=(Math.random()-.5)*.025;
      const s=Math.sqrt(n.vx*n.vx+n.vy*n.vy);if(s>3){n.vx=n.vx/s*3;n.vy=n.vy/s*3;}
      n.x+=n.vx;n.y+=n.vy;
      if(n.x<0){n.x=0;n.vx=Math.abs(n.vx)*.7;}if(n.x>W){n.x=W;n.vx=-Math.abs(n.vx)*.7;}
      if(n.y<0){n.y=0;n.vy=Math.abs(n.vy)*.7;}if(n.y>H){n.y=H;n.vy=-Math.abs(n.vy)*.7;}
    }
    mouse.vx*=.75;mouse.vy*=.75;requestAnimationFrame(draw);
  }
  draw();
})();
</script>
